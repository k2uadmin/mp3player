<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>My MP3 Player Online</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,Arial,sans-serif;}
body{background:#f0f2f5;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:2rem 1rem;}
.player{max-width:960px;width:100%;background:#fff;border-radius:12px;overflow:hidden;
        box-shadow:0 8px 24px rgba(0,0,0,.12);}

/* ---------- Header ----------
   (logo + description) */
.header{
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:#fff;padding:1.2rem 1.5rem;text-align:center;
}
.header h1{font-size:1.6rem;margin-bottom:.3rem;}
.header p{font-size:.9rem;opacity:.9;}

/* ---------- Now playing ----------
   只顯示曲目資訊，控制按鈕已移到最下方 */
.now-playing{
    padding:1rem 1.5rem;border-bottom:1px solid #eee;
}
.now-playing h2{font-size:1.2rem;color:#333;margin-bottom:.6rem;}
.song-info{display:flex;justify-content:space-between;align-items:center;}
.song-title{font-weight:600;font-size:1rem;}
.collection-name{color:#666;font-size:.9rem;}

/* ---------- Bottom controls ----------
   Prev / Play / 隨機 / Next，統一樣式、居中 */
.bottom-controls{
    display:flex;justify-content:center;gap:.6rem;padding:1rem 0;
}
.ctrl{
    background:#6a11cb;color:#fff;border:none;border-radius:5px;
    padding:.45rem .9rem;cursor:pointer;transition:background .25s;
    font-size:.95rem;min-width:80px; text-align:center;
}
.ctrl:hover{background:#2575fc;}

/* ---------- Audio element ----------
   原生控制條 */
.audio-wrapper{margin-top:.8rem;padding:0 1.5rem;}
audio{width:100%;}

/* ---------- Playlist ----------
   只一次顯示 13 行，目錄可捲動 */
.playlist-container{padding:1rem 1.5rem;}
.playlist{
    max-height:calc(13 * 2.2rem + 2px);   /* 13 行高度 */
    overflow-y:auto;
    border:1px solid #eee;
    border-radius:5px;
}
table{width:100%;border-collapse:collapse;}
th,td{padding:.6rem .4rem;text-align:left;border-bottom:1px solid #eee;}
th{
    background:#f8f9fa;position:sticky;top:0;z-index:1;
    font-weight:600;color:#333;
}
tr:hover{background:#f8f9fa;}
tr.current{background:#e6f7ff;}
.title-link{color:#6a11cb;cursor:pointer;text-decoration:underline;}
.title-link:hover{color:#2575fc;}

/* ---------- Pagination ----------
   First / Prev / number(5) / Next / End + info */
.pagination{
    display:flex;align-items:center;gap:.4rem;margin-top:1rem;
    justify-self: center;
}
.page-btn{
    background:#e9ecef;color:#555;border:none;border-radius:4px;
    padding:.35rem .6rem;cursor:pointer;transition:background .2s;font-size:.85rem;
}
.page-btn:hover{background:#dee2e6;}
.page-btn[disabled]{opacity:.5;cursor:not-allowed;}
.page-btn.active{background:#6a11cb;color:#fff;}
.page-info{font-size:.9rem;color:#666;margin-left:.6rem;}

/* ---------- Mobile ----------
   小螢幕排版 */
@media (max-width:600px){
    .header{text-align:left;}
    th,td{font-size:.85rem;}
}

</style>
</head>

<body>
<div class="player">

    <!-- Header -->
    <div class="header">
        <h1>My MP3 Player Online</h1>
        <p>Default source:
        <a href="https://buddhisttemple.ca/zh-hant/" target="_blank" style="color: #fff; text-decoration: none;" rel="noopener noreferrer";>
        國際佛教觀音寺
        </a>
        </p>
        <a href="http://www.namoamitabha.net/namo_mp3/yuan_series/content.htm" target="_blank" style="color:#fff; text-decoration: none;" rel="noopener noreferrer";>
        觀成法師主講
        </a>
        </p>
    </div>

    <!-- Now playing (only info) -->
    <section class="now-playing">
        <h2>Now Playing</P></h2>
        <div class="song-info">
            <div>
                <div class="song-title" id="currentSongTitle">No selection</div>
                <div class="collection-name" id="currentCollection">No collection selected</div>
            </div>
        </div>
        <div class="audio-wrapper">
            <audio id="audioPlayer" controls></audio>
        </div>
    </section>

    <!-- Bottom playback controls (Prev / Play / 隨機 / Next) -->
    <div class="bottom-controls">
        <button class="ctrl" id="prevBtn">Prev</button>
        <button class="ctrl" id="playBtn">Play</button>
        <button class="ctrl" id="shuffleBtn">Shuffle</button>
        <button class="ctrl" id="nextBtn">Next</button>
    </div>

    <!-- Playlist -->
    <section class="playlist-container">
        <div class="playlist-header" style="margin-bottom:15px;display:flex;justify-content:space-between;align-items:center;">
            <div class="playlist-title" style="font-size:1.2rem;font-weight:bold;color:#333;">Playlist</div>
            <div>
                <input type="file" id="csvFileInput" accept=".csv" style="display:none;">
                <button id="loadCsvBtn" style="background:#6a11cb;color:#fff;border:none;border-radius:5px;padding:.4rem .8rem;cursor:pointer;">加载 CSV</button>
            </div>
        </div>

        <div class="playlist" id="playlistContent">
            <div style="text-align:center;padding:20px;color:#999;">请加载CSV文件</div>
        </div>

        <div class="pagination" id="paginationControls" style="display:none;">
            <button class="page-btn" id="firstPageBtn">« First</button>
            <button class="page-btn" id="prevPageBtn">Prev</button>
            <span id="pageNumbers"></span>
            <button class="page-btn" id="nextPageBtn">Next</button>
            <button class="page-btn" id="lastPageBtn">End »</button>
            <span class="page-info" id="pageInfo"></span>
        </div>
    </section>
</div>
<script>
/* ---------- 狀態與 DOM ---------- */
const player = {
    playlist: [],          // 所有歌曲
    currentIndex: -1,      // -1 = 未選曲
    pageSize: 50,          // 每頁 50 筆（資料層）
    currentPage: 1,        // 目前第幾頁
    shuffleMode: false    // Shuffle 開關
};

const el = {
    currentSongTitle: document.getElementById('currentSongTitle'),
    currentCollection: document.getElementById('currentCollection'),
    prevBtn: document.getElementById('prevBtn'),
    playBtn: document.getElementById('playBtn'),
    nextBtn: document.getElementById('nextBtn'),
    shuffleBtn: document.getElementById('shuffleBtn'),
    audioPlayer: document.getElementById('audioPlayer'),
    csvFileInput: document.getElementById('csvFileInput'),
    loadCsvBtn: document.getElementById('loadCsvBtn'),
    playlistContent: document.getElementById('playlistContent'),
    paginationControls: document.getElementById('paginationControls'),
    firstPageBtn: document.getElementById('firstPageBtn'),
    prevPageBtn: document.getElementById('prevPageBtn'),
    nextPageBtn: document.getElementById('nextPageBtn'),
    lastPageBtn: document.getElementById('lastPageBtn'),
    pageNumbers: document.getElementById('pageNumbers'),
    pageInfo: document.getElementById('pageInfo')
};

/* ---------- 初始化 ----------
   (全部事件綁定) */
function init(){
    // CSV – 手動載入的舊方式仍保留
    el.loadCsvBtn.addEventListener('click',()=>el.csvFileInput.click());
    el.csvFileInput.addEventListener('change',handleFileSelect);

    // 播放控制
    el.prevBtn.addEventListener('click',playPrev);
    el.nextBtn.addEventListener('click',playNext);
    el.playBtn.addEventListener('click',togglePlay);
    el.shuffleBtn.addEventListener('click',toggleShuffle);
    el.audioPlayer.addEventListener('ended',autoPlayNext);

    // 分頁
    el.firstPageBtn.addEventListener('click',()=>{player.currentPage=1;renderPlaylist();renderPagination();});
    el.prevPageBtn.addEventListener('click',()=>{if(player.currentPage>1){player.currentPage--;renderPlaylist();renderPagination();}});
    el.nextPageBtn.addEventListener('click',()=>{if(player.currentPage<totalPages()){player.currentPage++;renderPlaylist();renderPagination();}});
    el.lastPageBtn.addEventListener('click',()=>{player.currentPage=totalPages();renderPlaylist();renderPagination();});

    /* ---- 1️⃣ 自動載入預設 CSV ---- */
    loadDefaultCsv();          // ← 只要呼叫一次即可
}
document.addEventListener('DOMContentLoaded',init);

/* ---------- 2️⃣ 讀取預設 CSV ----------
   使用 fetch() 取得同資料夾下的 mp3_urls.csv   */
function loadDefaultCsv(){
    // 若需要改成絕對路徑，只要把下面的字串換成完整 URL 即可
    // 例：fetch('https://example.com/files/mp3_urls.csv')
    fetch('mp3_urls.csv')
        .then(resp=>{
            if (!resp.ok) throw new Error('找不到 mp3_urls.csv');
            return resp.text();
        })
        .then(txt=>parseCSV(txt))      // 直接走既有的 CSV 解析流程
        .catch(err=>{ 
            console.warn('自動載入失敗，仍可手動點「加载 CSV」：', err);
            // 若找不到預設檔案，保持原本的「請加載 CSV」訊息
        });
}

/* ---------- CSV 手動讀取 ----------
   支援欄位內有逗號的情況 */
function handleFileSelect(e){
    const file=e.target.files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>parseCSV(ev.target.result);
    reader.onerror=()=>alert('讀取檔案失敗');
    reader.readAsText(file,'UTF-8');
}
function parseCSV(txt){
    const lines=txt.split(/\r?\n/).filter(l=>l.trim()!=='');
    if(lines.length<2){alert('CSV 必須至少有標題列和一筆資料');return;}
    const header=parseCSVLine(lines[0]);
    const iColl=header.findIndex(h=>h.toLowerCase()==='collection');
    const iTitle=header.findIndex(h=>h.toLowerCase()==='title');
    const iURL=header.findIndex(h=>h.toLowerCase().includes('mp3')||h.toLowerCase().includes('url'));
    if(iColl===-1||iTitle===-1||iURL===-1){
        alert('找不到 Collection、Title、MP3_URL 任一欄位');
        return;
    }
    player.playlist=[];
    for(let i=1;i<lines.length;i++){
        const cols=parseCSVLine(lines[i]);
        if(cols.length>Math.max(iColl,iTitle,iURL)){
            player.playlist.push({
                collection:cols[iColl]?.trim()||'',
                title:cols[iTitle]?.trim()||'',
                url:cols[iURL]?.trim()||''
            });
        }
    }
    if(player.playlist.length===0){alert('未解析到有效歌曲');return;}
    player.currentIndex=-1;
    player.currentPage=1;
    renderPlaylist();
    renderPagination();
    updateNowPlaying();
    console.log(`成功載入 ${player.playlist.length} 首歌曲`);
}
function parseCSVLine(line){
    const res=[];let cur='';let inQ=false;
    for(let i=0;i<line.length;i++){
        const ch=line[i];
        if(ch==='"'){inQ=!inQ;}
        else if(ch===',' && !inQ){res.push(cur);cur='';}
        else{cur+=ch;}
    }
    res.push(cur);
    return res;
}

/* ---------- 目錄與分頁渲染 ----------
   每頁 50 筆，表格一次只顯示 13 行 (捲動) */
function renderPlaylist(){
    if(player.playlist.length===0){
        el.playlistContent.innerHTML='<div style="text-align:center;padding:20px;color:#999;">请加载CSV文件</div>';
        el.paginationControls.style.display='none';
        return;
    }
    const start=(player.currentPage-1)*player.pageSize;
    const end=Math.min(start+player.pageSize,player.playlist.length);
    const pageData=player.playlist.slice(start,end);

    let html=`<table><thead><tr><th>No</th><th>Collection</th><th>Title</th></tr></thead><tbody>`;
    pageData.forEach((item,idx)=>{
        const globalIdx=start+idx;
        const curCls=globalIdx===player.currentIndex?'current':'';
        html+=`<tr class="${curCls}" data-index="${globalIdx}">
            <td>${globalIdx+1}</td>
            <td>${item.collection}</td>
            <td><span class="title-link" data-index="${globalIdx}">${item.title}</span></td>
        </tr>`;
    });
    html+='</tbody></table>';
    el.playlistContent.innerHTML=html;

    // 點標題播放
    document.querySelectorAll('.title-link').forEach(l=>{
        l.addEventListener('click',e=>{
            e.stopPropagation();
            loadTrack(parseInt(e.target.dataset.index));
        });
    });
    // 點整行也能播放
    document.querySelectorAll('#playlistContent tbody tr').forEach(row=>{
        row.addEventListener('click',()=>loadTrack(parseInt(row.dataset.index)));
    });

    el.paginationControls.style.display='flex';
}

/* 分頁控制——最多 5 個連續頁碼 */
function totalPages(){return Math.max(1,Math.ceil(player.playlist.length/player.pageSize));}
function renderPagination(){
    const total=totalPages();
    const cur=player.currentPage;
    el.firstPageBtn.disabled=cur===1;
    el.prevPageBtn.disabled=cur===1;
    el.nextPageBtn.disabled=cur===total;
    el.lastPageBtn.disabled=cur===total;

    // 5 個連續頁碼
    let startNum=1;
    if(total>5){ startNum=Math.max(1, Math.min(cur-2, total-4)); }
    const endNum=Math.min(startNum+4,total);
    let nums='';
    for(let p=startNum;p<=endNum;p++){
        const cls=p===cur?'page-btn active':'page-btn';
        nums+=`<button class="${cls}" data-page="${p}">${p}</button>`;
    }
    el.pageNumbers.innerHTML=nums;
    el.pageNumbers.querySelectorAll('button').forEach(b=>{
        b.addEventListener('click',()=>{player.currentPage=parseInt(b.dataset.page);renderPlaylist();renderPagination();});
    });
    el.pageInfo.textContent=`Page ${cur} Of ${total} `;
}

/* ---------- 播放相關 ----------
   loadTrack、togglePlay、playPrev / playNext、autoPlayNext、shuffle */
function loadTrack(idx){
    if(idx<0||idx>=player.playlist.length) return;
    player.currentIndex=idx;
    const t=player.playlist[idx];
    el.currentSongTitle.textContent=t.title;
    el.currentCollection.textContent=t.collection;
    el.audioPlayer.src=t.url;
    renderPlaylist();                     // 更新高亮
    el.audioPlayer.play().catch(()=>el.playBtn.textContent='Play');
    el.playBtn.textContent='Pause';
}
function togglePlay(){
    if(player.currentIndex===-1 && player.playlist.length>0){
        // 未選曲 → 播放當前頁的第一首
        loadTrack((player.currentPage-1)*player.pageSize);
        return;
    }
    if(el.audioPlayer.paused){
        el.audioPlayer.play();
        el.playBtn.textContent='Pause';
    }else{
        el.audioPlayer.pause();
        el.playBtn.textContent='Play';
    }
}
function playPrev(){
    if(player.playlist.length===0) return;
    if(player.shuffleMode){
        loadTrack(randomIdxInCurrentPage());
    }else{
        const prevIdx=player.currentIndex>0?player.currentIndex-1:player.playlist.length-1;
        loadTrack(prevIdx);
    }
}
function playNext(){
    if(player.playlist.length===0) return;
    if(player.shuffleMode){
        loadTrack(randomIdxInCurrentPage());
    }else{
        const nextIdx=(player.currentIndex+1)%player.playlist.length;
        loadTrack(nextIdx);
    }
}
function autoPlayNext(){
    if(player.playlist.length===0) return;
    if(player.shuffleMode){
        loadTrack(randomIdxInCurrentPage());
    }else{
        const nextIdx=(player.currentIndex+1)%player.playlist.length;
        loadTrack(nextIdx);
    }
}
function toggleShuffle(){
    player.shuffleMode=!player.shuffleMode;
    el.shuffleBtn.textContent = player.shuffleMode ? 'Shuffle ✔' : 'Shuffle';
}
function randomIdxInCurrentPage(){
    const start=(player.currentPage-1)*player.pageSize;
    const end=Math.min(start+player.pageSize,player.playlist.length)-1;
    return Math.floor(Math.random()*(end-start+1))+start;
}

/* ---------- 更新當前資訊 ----------
   CSV 載入或曲目變更時呼叫 */
function updateNowPlaying(){
    if(player.currentIndex===-1){
        el.currentSongTitle.textContent='No selection';
        el.currentCollection.textContent='No collection selected';
        el.audioPlayer.src='';
    }else{
        const t=player.playlist[player.currentIndex];
        el.currentSongTitle.textContent=t.title;
        el.currentCollection.textContent=t.collection;
        el.audioPlayer.src=t.url;
    }
}
</script>


</body>
</html>
