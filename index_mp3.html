<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地MP3播放器 - 从配置文件加载</title>
    <style>
        /* 使用与之前相同的样式，这里只显示关键修改部分 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .player-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .config-section {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #ddd;
        }
        .config-controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .config-btn {
            padding: 8px 16px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .config-btn:hover {
            background: #2980b9;
        }
        .config-textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: monospace;
            resize: vertical;
        }
        /* ... 其余样式保持相同 ... */
    </style>
</head>
<body>
    <div class="player-container">
        <!-- 配置区域 -->
        <div class="config-section">
            <h3>📁 MP3播放列表配置</h3>
            <p>在下方每行输入一个MP3文件的完整路径，然后点击"加载播放列表"</p>
            <textarea class="config-textarea" id="playlistConfig" placeholder="示例：
L:\Music\歌曲1.mp3
L:\Music\专辑\歌曲2.mp3
D:\My Music\周杰伦 - 晴天.mp3
注意：必须通过下面的文件选择器实际选择这些文件"></textarea>
            <div class="config-controls">
                <button class="config-btn" id="loadFromConfig">📂 加载播放列表</button>
                <input type="file" id="fileSelector" multiple accept="audio/mp3" style="display: none;">
                <button class="config-btn" id="browseBtn">🔍 浏览文件...</button>
                <button class="config-btn" id="saveTemplateBtn">💾 保存配置模板</button>
            </div>
            <p style="margin-top: 10px; color: #666; font-size: 12px;">
                提示：您需要手动选择一次文件，但之后可以保存配置文件以便快速重新加载
            </p>
        </div>

        <!-- 播放器主体（保持与之前相同的结构） -->
        <div class="player-header">
            <h1>🎵 本地MP3播放器</h1>
            <p>支持从配置文件加载播放列表</p>
        </div>
        
        <div class="current-track">
            <div class="track-info">
                <div class="album-art">🎶</div>
                <div class="track-details">
                    <h3 id="trackTitle">未选择音乐</h3>
                    <p id="trackTime">--:-- / --:--</p>
                </div>
            </div>
            <div class="progress-bar">
                <div class="progress"></div>
            </div>
            <div class="time-display">
                <span class="current-time">00:00</span>
                <span class="total-time">00:00</span>
            </div>
        </div>
        
        <div class="controls">
            <div class="main-controls">
                <button class="control-btn shuffle-btn" title="随机播放">🔀</button>
                <button class="control-btn prev-btn" title="上一首">⏮</button>
                <button class="control-btn play-btn" title="播放">▶</button>
                <button class="control-btn next-btn" title="下一首">⏭</button>
                <button class="control-btn loop-btn" title="循环播放">🔁</button>
            </div>
            
            <div class="mode-controls">
                <button class="mode-btn active" data-mode="list">顺序播放</button>
                <button class="mode-btn" data-mode="single">单曲循环</button>
                <button class="mode-btn" data-mode="shuffle">随机播放</button>
            </div>
            
            <div class="volume-control">
                <span>🔈</span>
                <input type="range" class="volume-slider" min="0" max="100" value="70">
                <span>🔊</span>
            </div>
        </div>
        
        <div class="playlist-container">
            <div class="playlist-header">
                <div class="playlist-title">🎵 播放列表</div>
                <div id="fileCount">0 首歌曲</div>
            </div>
            <ul class="playlist" id="playlist">
                <li class="playlist-item empty">
                    <div class="playlist-index">-</div>
                    <div class="playlist-title">请加载或选择MP3文件</div>
                    <div class="playlist-duration">--:--</div>
                </li>
            </ul>
        </div>
    </div>

    <script>
        class LocalMP3Player {
            constructor() {
                this.audio = new Audio();
                this.playlist = [];
                this.fileMap = new Map(); // 存储文件名到File对象的映射
                this.currentTrackIndex = 0;
                this.isPlaying = false;
                this.currentMode = 'list';
                
                this.initializeElements();
                this.setupEventListeners();
            }
            
            initializeElements() {
                this.playBtn = document.querySelector('.play-btn');
                this.prevBtn = document.querySelector('.prev-btn');
                this.nextBtn = document.querySelector('.next-btn');
                this.shuffleBtn = document.querySelector('.shuffle-btn');
                this.loopBtn = document.querySelector('.loop-btn');
                this.progressBar = document.querySelector('.progress');
                this.progressContainer = document.querySelector('.progress-bar');
                this.currentTimeEl = document.querySelector('.current-time');
                this.totalTimeEl = document.querySelector('.total-time');
                this.trackTitle = document.getElementById('trackTitle');
                this.trackTime = document.getElementById('trackTime');
                this.playlistEl = document.getElementById('playlist');
                this.volumeSlider = document.querySelector('.volume-slider');
                this.modeBtns = document.querySelectorAll('.mode-btn');
                this.albumArt = document.querySelector('.album-art');
                
                // 新添加的配置元素
                this.playlistConfig = document.getElementById('playlistConfig');
                this.loadFromConfigBtn = document.getElementById('loadFromConfig');
                this.fileSelector = document.getElementById('fileSelector');
                this.browseBtn = document.getElementById('browseBtn');
                this.saveTemplateBtn = document.getElementById('saveTemplateBtn');
                this.fileCount = document.getElementById('fileCount');
            }
            
            setupEventListeners() {
                // 播放控制
                this.playBtn.addEventListener('click', () => this.togglePlay());
                this.prevBtn.addEventListener('click', () => this.prevTrack());
                this.nextBtn.addEventListener('click', () => this.nextTrack());
                this.shuffleBtn.addEventListener('click', () => this.toggleShuffle());
                this.loopBtn.addEventListener('click', () => this.toggleLoop());
                
                // 音频事件
                this.audio.addEventListener('timeupdate', () => this.updateProgress());
                this.audio.addEventListener('loadedmetadata', () => this.updateTrackInfo());
                this.audio.addEventListener('ended', () => this.handleTrackEnd());
                
                // 进度条
                this.progressContainer.addEventListener('click', (e) => this.setProgress(e));
                
                // 音量控制
                this.volumeSlider.addEventListener('input', (e) => {
                    this.audio.volume = e.target.value / 100;
                });
                
                // 播放模式
                this.modeBtns.forEach(btn => {
                    btn.addEventListener('click', (e) => this.setPlayMode(e.target.dataset.mode));
                });
                
                // 配置文件相关
                this.loadFromConfigBtn.addEventListener('click', () => this.loadFromConfig());
                this.browseBtn.addEventListener('click', () => this.fileSelector.click());
                this.fileSelector.addEventListener('change', (e) => this.loadFiles(e.target.files));
                this.saveTemplateBtn.addEventListener('click', () => this.saveConfigTemplate());
                
                // 从配置文件加载示例
                this.loadExampleConfig();
            }
            
            loadExampleConfig() {
                // 在配置区域显示示例路径
                const exampleConfig = `# 在此处输入您的MP3文件路径（每行一个）
# 例如：
# L:\\Music\\歌曲1.mp3
# L:\\Music\\专辑\\歌曲2.mp3
# D:\\My Music\\周杰伦 - 晴天.mp3
# 
# 注意：您仍然需要通过"浏览文件"按钮实际选择这些文件
# 但可以保存此配置文件以便下次快速重新加载

L:\\mp3\\example1.mp3
L:\\mp3\\example2.mp3
L:\\mp3\\example3.mp3`;
                
                this.playlistConfig.value = exampleConfig;
            }
            
            async loadFromConfig() {
                const configText = this.playlistConfig.value;
                const lines = configText.split('\n')
                    .map(line => line.trim())
                    .filter(line => line && !line.startsWith('#') && line.endsWith('.mp3'));
                
                if (lines.length === 0) {
                    alert('配置文件中没有找到有效的MP3文件路径！');
                    return;
                }
                
                // 显示文件选择对话框
                this.fileSelector.click();
                
                // 保存配置到localStorage以便下次使用
                localStorage.setItem('mp3PlayerConfig', configText);
            }
            
            loadFiles(files) {
                this.playlist = [];
                this.fileMap.clear();
                
                const mp3Files = Array.from(files).filter(file => 
                    file.type === 'audio/mpeg' || file.name.toLowerCase().endsWith('.mp3')
                );
                
                if (mp3Files.length === 0) {
                    alert('没有选择MP3文件！');
                    return;
                }
                
                // 创建播放列表
                mp3Files.forEach((file, index) => {
                    const track = {
                        name: this.cleanFileName(file.name),
                        file: file,
                        duration: '--:--',
                        filePath: file.webkitRelativePath || file.name,
                        index: index
                    };
                    
                    this.playlist.push(track);
                    this.fileMap.set(track.name, file);
                });
                
                this.renderPlaylist();
                this.updateFileCount();
                
                if (this.playlist.length > 0) {
                    this.loadTrack(0);
                }
            }
            
            cleanFileName(filename) {
                // 清理文件名，移除扩展名和特殊字符
                return filename
                    .replace('.mp3', '')
                    .replace(/_/g, ' ')
                    .replace(/\./g, ' ')
                    .trim();
            }
            
            async loadTrack(index) {
                if (this.playlist.length === 0) return;
                
                this.currentTrackIndex = index;
                const track = this.playlist[index];
                
                try {
                    const objectURL = URL.createObjectURL(track.file);
                    this.audio.src = objectURL;
                    
                    // 清理之前的URL对象
                    if (this.currentObjectURL) {
                        URL.revokeObjectURL(this.currentObjectURL);
                    }
                    this.currentObjectURL = objectURL;
                    
                    this.updateUI();
                    
                    // 自动播放
                    if (this.isPlaying) {
                        await this.audio.play();
                    }
                } catch (error) {
                    console.error('加载音频失败:', error);
                    alert(`无法加载音频: ${track.name}`);
                }
            }
            
            togglePlay() {
                if (this.playlist.length === 0) {
                    alert('请先加载音乐文件！');
                    return;
                }
                
                if (this.isPlaying) {
                    this.audio.pause();
                    this.playBtn.innerHTML = '▶';
                    this.playBtn.title = '播放';
                } else {
                    this.audio.play().then(() => {
                        this.playBtn.innerHTML = '⏸';
                        this.playBtn.title = '暂停';
                    }).catch(error => {
                        console.error('播放失败:', error);
                        alert('播放失败，请检查音频文件');
                    });
                }
                this.isPlaying = !this.isPlaying;
            }
            
            prevTrack() {
                if (this.playlist.length === 0) return;
                
                let newIndex = this.currentTrackIndex - 1;
                if (newIndex < 0) newIndex = this.playlist.length - 1;
                
                this.loadTrack(newIndex);
                if (this.isPlaying) {
                    this.audio.play();
                }
            }
            
            nextTrack() {
                if (this.playlist.length === 0) return;
                
                let newIndex = this.currentTrackIndex + 1;
                if (newIndex >= this.playlist.length) newIndex = 0;
                
                this.loadTrack(newIndex);
                if (this.isPlaying) {
                    this.audio.play();
                }
            }
            
            updateUI() {
                if (this.playlist.length === 0) return;
                
                const track = this.playlist[this.currentTrackIndex];
                this.trackTitle.textContent = track.name;
                
                // 更新播放列表高亮
                document.querySelectorAll('.playlist-item').forEach((item, index) => {
                    item.classList.toggle('playing', index === this.currentTrackIndex);
                });
                
                this.albumArt.textContent = this.getMusicIcon(track.name);
            }
            
            getMusicIcon(name) {
                const icons = ['🎵', '🎶', '🎼', '🎤', '🎸', '🎹', '🎷', '🎺', '🎻', '🥁'];
                const hash = name.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
                return icons[hash % icons.length];
            }
            
            updateProgress() {
                if (!this.audio.duration) return;
                
                const percent = (this.audio.currentTime / this.audio.duration) * 100;
                this.progressBar.style.width = `${percent}%`;
                
                this.currentTimeEl.textContent = this.formatTime(this.audio.currentTime);
                this.totalTimeEl.textContent = this.formatTime(this.audio.duration);
                this.trackTime.textContent = `${this.formatTime(this.audio.currentTime)} / ${this.formatTime(this.audio.duration)}`;
            }
            
            updateTrackInfo() {
                const track = this.playlist[this.currentTrackIndex];
                if (track) {
                    track.duration = this.formatTime(this.audio.duration);
                    this.renderPlaylist();
                }
            }
            
            setProgress(e) {
                const width = this.progressContainer.clientWidth;
                const clickX = e.offsetX;
                const duration = this.audio.duration;
                
                this.audio.currentTime = (clickX / width) * duration;
            }
            
            handleTrackEnd() {
                if (this.currentMode === 'single') {
                    this.audio.currentTime = 0;
                    this.audio.play();
                } else {
                    this.nextTrack();
                }
            }
            
            setPlayMode(mode) {
                this.currentMode = mode;
                this.modeBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.mode === mode);
                });
            }
            
            toggleShuffle() {
                this.shuffleBtn.classList.toggle('active');
                // 随机播放逻辑
                if (this.playlist.length > 1) {
                    const shuffled = [...this.playlist];
                    for (let i = shuffled.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                    }
                    this.playlist = shuffled;
                    this.renderPlaylist();
                    this.loadTrack(0);
                }
            }
            
            toggleLoop() {
                this.loopBtn.classList.toggle('active');
                this.audio.loop = !this.audio.loop;
            }
            
            renderPlaylist() {
                this.playlistEl.innerHTML = '';
                
                if (this.playlist.length === 0) {
                    const li = document.createElement('li');
                    li.className = 'playlist-item empty';
                    li.innerHTML = `
                        <div class="playlist-index">-</div>
                        <div class="playlist-title">请加载或选择MP3文件</div>
                        <div class="playlist-duration">--:--</div>
                    `;
                    this.playlistEl.appendChild(li);
                    return;
                }
                
                this.playlist.forEach((track, index) => {
                    const li = document.createElement('li');
                    li.className = 'playlist-item';
                    if (index === this.currentTrackIndex) {
                        li.classList.add('playing');
                    }
                    
                    li.innerHTML = `
                        <div class="playlist-index">${index + 1}</div>
                        <div class="playlist-title">${track.name}</div>
                        <div class="playlist-duration">${track.duration}</div>
                    `;
                    
                    li.addEventListener('click', () => {
                        this.loadTrack(index);
                        if (!this.isPlaying) {
                            this.togglePlay();
                        }
                    });
                    
                    this.playlistEl.appendChild(li);
                });
            }
            
            updateFileCount() {
                this.fileCount.textContent = `${this.playlist.length} 首歌曲`;
            }
            
            saveConfigTemplate() {
                const configText = this.playlistConfig.value;
                const blob = new Blob([configText], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'mp3_player_config.txt';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                alert('配置文件已保存为 mp3_player_config.txt');
            }
            
            formatTime(seconds) {
                if (isNaN(seconds)) return '--:--';
                
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }
        }
        
        // 初始化播放器
        document.addEventListener('DOMContentLoaded', () => {
            const player = new LocalMP3Player();
            
            // 尝试加载之前保存的配置
            const savedConfig = localStorage.getItem('mp3PlayerConfig');
            if (savedConfig) {
                player.playlistConfig.value = savedConfig;
            }
        });
    </script>
</body>
</html>
